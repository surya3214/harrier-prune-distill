# Retrieval benchmark definitions for scripts/01_download_retrieval_eval_local.py
# Run on local infra (internet). Outputs parquet under {local_data_root}/retrieval_eval/

MSMARCO:
  task: MSMARCO
  lang: en
  split: dev
  output_dir: en/msmarco_dev
  hf_path: mteb/msmarco
  queries:
    config: queries
    split: queries
    id_column: _id
    text_column: text
  corpus:
    config: corpus
    split: corpus
    id_column: _id
    text_column: text
    title_column: title
  qrels:
    config: default
    split: dev
    query_id_column: query-id
    doc_id_column: corpus-id
    score_column: score

miracl_queries_defaults: &miracl_queries_defaults
  split: dev
  id_column: _id
  text_column: text

miracl_corpus_defaults: &miracl_corpus_defaults
  split: dev
  id_column: _id
  text_column: text
  title_column: title

miracl_qrels_defaults: &miracl_qrels_defaults
  split: dev
  query_id_column: query-id
  doc_id_column: corpus-id
  score_column: score

