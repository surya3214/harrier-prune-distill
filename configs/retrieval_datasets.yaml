  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: fr
      queries_config: queries-fr
      corpus_config: corpus-fr
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: french-hard-negatives-7

hi:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: hi
      queries_config: queries-hi
      corpus_config: corpus-hi
    - name: mmarco_train_ids
      <<: *unicamp_train_ids_defaults
      config: hindi

id:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: id
      queries_config: queries-id
      corpus_config: corpus-id
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
