    miracl_corpus_config: corpus-zh
    mteb_locale: zho-Hans
    sts_eval_tasks: [STS22.v2]
    retrieval_eval_tasks: [MIRACLRetrieval]
    num_epochs_sts: 1
    num_epochs_retrieval: 1

  it:
    name: Italian
    c4_config: it
    retrieval_backend: mmarco
    mmarco_config: italian
    mteb_locale: ita-Latn
    sts_eval_tasks: [STS22.v2]
    retrieval_eval_tasks: []
    num_epochs_sts: 1
    num_epochs_retrieval: 1

  pt:
    name: Portuguese
    c4_config: pt
    retrieval_backend: mmarco
    mmarco_config: portuguese
    mteb_locale: por-Latn
    sts_eval_tasks: [ASSIN2, STS22.v2]
    retrieval_eval_tasks: []
    num_epochs_sts: 1
    num_epochs_retrieval: 1

  vi:
    name: Vietnamese
    c4_config: vi
    retrieval_backend: mmarco
    mmarco_config: vietnamese
    mteb_locale: vie-Latn
    sts_eval_tasks: [STS22.v2]
    retrieval_eval_tasks: []
    num_epochs_sts: 1
    num_epochs_retrieval: 1

  pl:
    name: Polish
    c4_config: pl
    retrieval_backend: maupqa
    mteb_locale: pol-Latn
    sts_eval_tasks: [STS22.v2]
    retrieval_eval_tasks: [BEIR-PL]
    num_epochs_sts: 1
    num_epochs_retrieval: 1

waves:
  wave1:
    name: MIRACL_12
    languages: [en, ar, de, es, fr, hi, id, ja, ko, ru, th, zh]
  wave2:
    name: mMARCO
    languages: [it, pt, vi]
  wave3:
    name: PL
    languages: [pl]
