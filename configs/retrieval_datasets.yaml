# Retrieval distillation corpora for phase 2 (16 languages).
# Download with scripts/01_download_retrieval_local.py on local infra (internet).
# Target: ~350k multi-neg triplets/lang (7 hard negatives) for strong score_kl.
# ko/th have no public mMARCO; expect <<350k (MIRACL + Mr. TyDi HN only).

languages:
  - en
  - ar
  - de
  - es
  - fr
  - hi
  - id
  - ja
  - ko
  - ru
  - th
  - zh
  - it
  - pt
  - vi
  - pl

pilot:
  enabled: false
  triplets_per_lang: 10000

miracl_defaults: &miracl_defaults
  hf_path: datalama/miracl-hard-negatives
  qrels_split: dev
  queries_split: queries
  corpus_split: corpus
  query_id_column: query-id
  qrels_corpus_id_column: corpus-id
  queries_id_column: _id
  corpus_row_id_column: _id
  score_column: score
  positives_per_query: 1
  negatives_per_query: 8

# Reranker-filtered hard negatives with 7 explicit negative columns (~300k/lang).
mmarco_hard_negatives_7_defaults: &mmarco_hard_negatives_7_defaults
  hf_path: hotchpotch/mmarco-hard-negatives-reranker-filtered
  split: train
  streaming: true
  query_column: query
  positive_column: positive
  negative_columns:
    - negative_1
    - negative_2
    - negative_3
    - negative_4
    - negative_5
    - negative_6
    - negative_7
  negatives_per_triplet: 7

# unicamp train ID triples packed to 7 negs per query (hi/ru/pt).
unicamp_train_ids_defaults: &unicamp_train_ids_defaults
  loader: unicamp_mmarco_train_ids
  hf_path: unicamp-dl/mmarco
  translation: google
  negatives_per_triplet: 7
  group_negatives_by_query: true
  # Read enough 1-neg ID rows to pack ~350k queries × 7 negs.
  max_id_triples: 3000000

mmarco_vi_defaults: &mmarco_vi_defaults
  hf_path: chieunq/mMARCO_vietnamese
  split: train
  streaming: true
  query_column: query
  positive_column: positive
  negative_column: negative
  negatives_per_triplet: 7
  group_negatives_by_query: true

mrtydi_hn_defaults: &mrtydi_hn_defaults
  loader: mrtydi_hard_negatives
  hf_path: crystina-z/mrtydi-mContriever-mmarco-HN
  split: train
  streaming: true
  query_column: query
  positives_column: positive_passages
  negatives_column: negative_passages
  negatives_per_triplet: 7

en:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives_en
      <<: *miracl_defaults
      qrels_config: en
      queries_config: queries-en
      corpus_config: corpus-en
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: english-hard-negatives-7

ar:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ar
      queries_config: queries-ar
      corpus_config: corpus-ar
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: arabic-hard-negatives-7

de:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: de
      queries_config: queries-de
      corpus_config: corpus-de
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
