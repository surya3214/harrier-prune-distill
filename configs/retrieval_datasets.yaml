# Retrieval distillation corpora for phase 2 (16 languages).
# Download with scripts/01_download_retrieval_local.py on local infra (internet).

languages:
  - en
  - ar
  - de
  - es
  - fr
  - hi
  - id
  - ja
  - ko
  - ru
  - th
  - zh
  - it
  - pt
  - vi
  - pl

pilot:
  enabled: false
  triplets_per_lang: 10000

miracl_defaults: &miracl_defaults
  hf_path: datalama/miracl-hard-negatives
  qrels_split: dev
  queries_split: queries
  corpus_split: corpus
  query_id_column: query-id
  qrels_corpus_id_column: corpus-id
  queries_id_column: _id
  corpus_row_id_column: _id
  score_column: score
  positives_per_query: 1
  negatives_per_query: 3

en:
  target_triplets: 300000
  sources:
    - name: miracl_hard_negatives_en
      <<: *miracl_defaults
      target_triplets: 10000
      qrels_config: en
      queries_config: queries-en
      corpus_config: corpus-en
    - name: msmarco_hard_triplets
      target_triplets: 290000
      hf_path: sentence-transformers/msmarco-co-condenser-margin-mse-sym-mnrl-mean-v1
      config: triplet
      split: train
      streaming: true
      query_column: query
      positive_column: positive
      negative_column: negative
      negatives_per_triplet: 1

ar:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ar
      queries_config: queries-ar
      corpus_config: corpus-ar

de:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: de
      queries_config: queries-de
      corpus_config: corpus-de

es:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: es
      queries_config: queries-es
      corpus_config: corpus-es

fr:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: fr
      queries_config: queries-fr
      corpus_config: corpus-fr

hi:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: hi
      queries_config: queries-hi
      corpus_config: corpus-hi

id:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: id
      queries_config: queries-id
      corpus_config: corpus-id

ja:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ja
      queries_config: queries-ja
      corpus_config: corpus-ja

ko:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ko
      queries_config: queries-ko
      corpus_config: corpus-ko

ru:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ru
      queries_config: queries-ru
      corpus_config: corpus-ru

th:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: th
      queries_config: queries-th
      corpus_config: corpus-th

zh:
  target_triplets: 150000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: zh
      queries_config: queries-zh
      corpus_config: corpus-zh

mmarco_defaults: &mmarco_defaults
  hf_path: hotchpotch/mmarco-hard-negatives-reranker-filtered
  split: train
  streaming: true
  query_column: query
  positive_column: positive
  negative_column: negative
  negatives_per_triplet: 1

mmarco_vi_defaults: &mmarco_vi_defaults
  hf_path: chieunq/mMARCO_vietnamese
  split: train
  streaming: true
  query_column: query
  positive_column: positive
  negative_column: negative
  negatives_per_triplet: 1

mmarco_pt_defaults: &mmarco_pt_defaults
  loader: unicamp_mmarco
  hf_path: unicamp-dl/mmarco
  translation: google
  split: train
  streaming: false
  negatives_per_triplet: 1

it:
  target_triplets: 300000
  sources:
    - name: mmarco_triplets
      <<: *mmarco_defaults
      config: italian-triplet

pt:
  target_triplets: 300000
  sources:
    - name: mmarco_triplets
      <<: *mmarco_pt_defaults
      config: portuguese

vi:
  target_triplets: 300000
  sources:
    - name: mmarco_triplets
      <<: *mmarco_vi_defaults

pl:
  target_triplets: 200000
  sources:
    - name: maupqa
      loader: maupqa_csv
      hf_path: ipipan/maupqa
      csv_subsets: [msmarco, nq, poquad, mqa, mkqa]
      split: train
      streaming: true
      query_column: question
      positive_relevant: true
      negatives_per_triplet: 3

pilot_sources:
  en:
    target_triplets: 10100
    sources:
      - name: miracl_hard_negatives_mini_en
        target_triplets: 100
        hf_path: datalama/miracl-hard-negatives-mini
        qrels_config: en-qrels
        qrels_split: test
        queries_config: en-queries
        queries_split: queries
        corpus_config: en-corpus
        corpus_split: corpus
        queries_id_column: id
        corpus_row_id_column: id
        query_id_column: query-id
        qrels_corpus_id_column: corpus-id
        score_column: score
        positives_per_query: 1
        negatives_per_query: 3
      - name: msmarco_hard_triplets
        target_triplets: 10000
        hf_path: sentence-transformers/msmarco-co-condenser-margin-mse-sym-mnrl-mean-v1
        config: triplet
        split: train
        streaming: true
        query_column: query
        positive_column: positive
        negative_column: negative
        negatives_per_triplet: 1
  ko:
    target_triplets: 100
    sources:
      - name: miracl_hard_negatives_mini
        hf_path: datalama/miracl-hard-negatives-mini
        qrels_config: ko-qrels
        qrels_split: test
        queries_config: ko-queries
        queries_split: queries
        corpus_config: ko-corpus
        corpus_split: corpus
        queries_id_column: id
        corpus_row_id_column: id
        query_id_column: query-id
        qrels_corpus_id_column: corpus-id
        score_column: score
        positives_per_query: 1
        negatives_per_query: 3

dedupe:
  normalize_whitespace: true
  lowercase_for_dedupe: false

output:
  format: parquet
  shard_size: 50000
