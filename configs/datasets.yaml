# HuggingFace dataset definitions for scripts/01_download_local.py
# Run on local infra (internet). Outputs deduplicated parquet per language.
#
# Default production: 1M texts/lang (850k C4 + 150k multilingual-NLI).
# Override via distill.yaml pilot_samples_per_lang or full_samples_per_lang.

en:
  target_samples: 1000000
  sources:
    - name: c4
      hf_path: allenai/c4
      config: en
      split: train
      streaming: true
      text_column: text
      target_samples: 700000
    - name: all_nli
      hf_path: sentence-transformers/all-nli
      config: pair
      split: train
      streaming: false
      text_columns:
        - anchor
        - positive
      target_samples: 150000
    - name: multilingual_nli
      hf_path: MoritzLaurer/multilingual-NLI-26lang-2mil7
      split: train
      streaming: true
      filter_lang: en
      text_columns:
        - premise
        - hypothesis
      target_samples: 150000

ko:
  target_samples: 1000000
  sources:
    - name: c4_ko
      hf_path: allenai/c4
      config: ko
      split: train
      streaming: true
      text_column: text
      target_samples: 700000
    - name: klue_nli
      hf_path: klue/klue
      config: nli
      split: train
      streaming: false
      text_columns:
        - premise
        - hypothesis
      target_samples: 50000
    - name: multilingual_nli
      hf_path: MoritzLaurer/multilingual-NLI-26lang-2mil7
      split: train
      streaming: true
      filter_lang: ko
      text_columns:
        - premise
        - hypothesis
      target_samples: 100000
    - name: fineweb2_ko
      hf_path: HuggingFaceFW/fineweb-2
      config: kor_Hang
      split: train
      streaming: true
      text_column: text
      target_samples: 150000
      optional: true

