ja:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ja
      queries_config: queries-ja
      corpus_config: corpus-ja
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: japanese-hard-negatives-7

ko:
  # No public mMARCO for Korean; expect <<350k (MIRACL + Mr. TyDi HN).
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ko
      queries_config: queries-ko
      corpus_config: corpus-ko
    - name: mrtydi_hard_negatives
      <<: *mrtydi_hn_defaults
      config: korean

ru:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: ru
      queries_config: queries-ru
      corpus_config: corpus-ru
    - name: mmarco_train_ids
      <<: *unicamp_train_ids_defaults
      config: russian

th:
  # No public mMARCO for Thai; expect <<350k (MIRACL + Mr. TyDi HN).
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: th
      queries_config: queries-th
      corpus_config: corpus-th
    - name: mrtydi_hard_negatives
      <<: *mrtydi_hn_defaults
      config: thai

zh:
  target_triplets: 350000
  sources:
    - name: miracl_hard_negatives
      <<: *miracl_defaults
      qrels_config: zh
      queries_config: queries-zh
      corpus_config: corpus-zh
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: chinese-hard-negatives-7

it:
  target_triplets: 350000
  sources:
    - name: mmarco_hard_negatives
      <<: *mmarco_hard_negatives_7_defaults
      config: italian-hard-negatives-7

pt:
  target_triplets: 350000
  sources:
    - name: mmarco_train_ids
      <<: *unicamp_train_ids_defaults
      config: portuguese

vi:
  target_triplets: 350000
  sources:
    - name: mmarco_triplets
      <<: *mmarco_vi_defaults

pl:
  target_triplets: 350000
  sources:
    - name: maupqa
      loader: maupqa_csv
      hf_path: ipipan/maupqa
      csv_subsets:
        - msmarco
        - nq
        - poquad
        - mqa
        - mkqa
        - gpt3-cc
        - gpt3.5-cc
        - gpt3.5-wiki
        - 1z10
        - czy-wiesz-v2
        - multilingual-NLI
        - poleval2021-pairs
        - templates
        - wiki-def
      split: train
      streaming: true
      query_column: question
      positive_relevant: true
      negatives_per_triplet: 7

pilot_sources:
  en:
    target_triplets: 10100
    sources:
      - name: miracl_hard_negatives_mini_en
        target_triplets: 100
        hf_path: datalama/miracl-hard-negatives-mini
        qrels_config: en-qrels
        qrels_split: test
        queries_config: en-queries
        queries_split: queries
        corpus_config: en-corpus
        corpus_split: corpus
        queries_id_column: id
        corpus_row_id_column: id
        query_id_column: query-id
        qrels_corpus_id_column: corpus-id
        score_column: score
        positives_per_query: 1
        negatives_per_query: 3
      - name: msmarco_hard_triplets
        target_triplets: 10000
        hf_path: sentence-transformers/msmarco-co-condenser-margin-mse-sym-mnrl-mean-v1
        config: triplet
        split: train
        streaming: true
        query_column: query
        positive_column: positive
        negative_column: negative
        negatives_per_triplet: 1
  ko:
    target_triplets: 100
    sources:
      - name: miracl_hard_negatives_mini
        hf_path: datalama/miracl-hard-negatives-mini
        qrels_config: ko-qrels
        qrels_split: test
        queries_config: ko-queries
        queries_split: queries
        corpus_config: ko-corpus
        corpus_split: corpus
        queries_id_column: id
        corpus_row_id_column: id
        query_id_column: query-id
        qrels_corpus_id_column: corpus-id
        score_column: score
        positives_per_query: 1
        negatives_per_query: 3

dedupe:
  normalize_whitespace: true
  lowercase_for_dedupe: false

output:
  format: parquet
  shard_size: 50000
