# Populate all paths before running. GPU scripts read only from gpu_data_root.
paths:
  local_data_root: ""        # local download target (internet)
  gpu_data_root: ""          # rsync destination on GPU node
  teacher_model: ""          # full 18-layer microsoft/harrier-oss-v1-270m path
  student_model: ""          # 12-layer pruned checkpoint path
  output_dir: ""             # checkpoints, cached embeddings, logs
  en_corpus: ""              # e.g. {gpu_data_root}/en/corpus.parquet
  ko_corpus: ""              # e.g. {gpu_data_root}/ko/corpus.parquet
  en_embeddings: ""          # e.g. {output_dir}/embeddings/en_embeddings.parquet
  ko_embeddings: ""          # e.g. {output_dir}/embeddings/ko_embeddings.parquet
  sts_data_root: ""            # e.g. {gpu_data_root}/sts
  en_sts_test: ""              # e.g. {sts_data_root}/en/stsbenchmark_test.parquet
  ko_sts_test: ""              # e.g. {sts_data_root}/ko/korsts_test.parquet
  # Optional explicit retrieval paths (defaults under {data_root}/retrieval/...)
  en_retrieval_corpus: ""
  ko_retrieval_corpus: ""
  en_retrieval_embeddings: ""
  ko_retrieval_embeddings: ""
  retrieval_checkpoint_en: ""
  retrieval_checkpoint_final: ""

data:
  pilot_samples_per_lang: 0    # 0 = disabled; use full_en_samples / full_ko_samples
  full_en_samples: 2300000
  full_ko_samples: 2300000
  max_length: 512
  min_text_chars: 20

training:
  embed_batch_size_per_gpu: 192
  train_batch_size_per_gpu: 256
  learning_rate: 1.0e-5
  num_epochs_en: 1
  num_epochs_ko: 1
  warmup_ratio: 0.05
  weight_decay: 0.01
  grad_clip: 1.0
  seed: 42
  prompt_name: sts_query

# Future phase: retrieval distillation (not used in v1 scripts)
phases:
  retrieval:
    query_prompt: web_search_query
    doc_prompt: null
    languages:
      - en
      - ko
    num_epochs_retrieval_en: 1
    num_epochs_retrieval_ko: 1
    datasets:
      en: msmarco_hard_triplets
      ko: miracl_hard_negatives

eval:
  tasks:
    - STSBenchmark
    - KorSTS
  prompt_name: sts_query
  batch_size: 64
  compare_teacher: "microsoft/harrier-oss-v1-270m"
  suites:
    en: [STSBenchmark]
    ko: [KorSTS]
    multilingual: [STSBenchmark, KorSTS]
    extended: [STSBenchmark, KorSTS, STS22.v2, STSBenchmarkMultilingualSTS]
  local_sts:
    split: test
    tasks:
      STSBenchmark: en/stsbenchmark_test.parquet
      KorSTS: ko/korsts_test.parquet
    dev_splits:
      STSBenchmark: en/stsbenchmark_validation.parquet
      KorSTS: ko/korsts_valid.parquet
  retrieval:
    tasks:
      - MSMARCO
      - MIRACLRetrieval
    query_prompt: web_search_query
    batch_size: 64
    languages:
      MSMARCO: eng-Latn
      MIRACLRetrieval:
        - eng-Latn
        - kor-Kore

debug:
  sample_size: 5000
  seed: 42
